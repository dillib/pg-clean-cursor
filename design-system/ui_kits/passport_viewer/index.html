<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PhotonicTag — Public Passport Viewer</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  body { margin:0; background: var(--ink-08); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; box-sizing:border-box; }
  .stage { display:flex; gap:32px; align-items:flex-start; }
  .caption { max-width:320px; color:var(--fg); font-family:var(--font-sans); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="../_shared/Primitives.jsx"></script>
<script type="text/babel" src="./ios-frame.jsx"></script>
<script type="text/babel" src="./Viewer.jsx"></script>

<script type="text/babel">
const App = () => (
  <div className="stage">
    <IOSDevice width={402} height={874}>
      <Viewer/>
    </IOSDevice>
    <div className="caption">
      <div style={{fontFamily:'var(--font-mono)', fontSize:11, color:'var(--fg-subtle)', textTransform:'uppercase', letterSpacing:'0.1em'}}>Public viewer</div>
      <h2 style={{fontFamily:'var(--font-display)', fontSize:28, fontWeight:600, letterSpacing:'-0.025em', lineHeight:1.05, marginTop:10, marginBottom:14}}>What shoppers and regulators see after scanning the QR.</h2>
      <p style={{fontSize:14, color:'var(--fg-muted)', lineHeight:1.55, margin:0}}>
        One surface, two audiences. A consumer can find care and repair in three taps;
        a DG GROW auditor can reach the eIDAS timestamp, SVHC declaration, and signed
        PDF in the same three.
      </p>
      <div style={{marginTop:20, paddingTop:16, borderTop:'1px solid var(--hairline)', fontFamily:'var(--font-mono)', fontSize:11, color:'var(--fg-subtle)', lineHeight:1.8}}>
        402 × 874 · iPhone 16<br/>
        Loads cold in &lt; 900ms (p95)<br/>
        Works offline after first view
      </div>
    </div>
  </div>
);
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
