<!doctype html><html><head><meta charset="utf-8"><title>Components — buttons</title><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="card__head"><div><div class="card__eyebrow">Components · Buttons</div><div class="card__title">Four variants. Sharp corners.</div></div><div class="card__meta">primary · secondary · ink · ghost<br/>sm 30 · md 36 · lg 48</div></div>

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:32px">

    <div>
      <div class="spec-label">Primary — yellow</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:14px;align-items:flex-start">
        <button style="height:30px;padding:0 12px;font:500 13px/1 var(--font-sans);letter-spacing:-0.01em;background:var(--yellow);color:var(--ink);border:1px solid var(--yellow);border-radius:2px;cursor:pointer">Start free audit</button>
        <button style="height:36px;padding:0 14px;font:500 14px/1 var(--font-sans);letter-spacing:-0.01em;background:var(--yellow);color:var(--ink);border:1px solid var(--yellow);border-radius:2px;cursor:pointer">Start free audit →</button>
        <button style="height:48px;padding:0 20px;font:500 15px/1 var(--font-sans);letter-spacing:-0.01em;background:var(--yellow);color:var(--ink);border:1px solid var(--yellow);border-radius:2px;cursor:pointer">Start free audit →</button>
      </div>
    </div>

    <div>
      <div class="spec-label">Secondary — hairline</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:14px;align-items:flex-start">
        <button style="height:30px;padding:0 12px;font:500 13px/1 var(--font-sans);letter-spacing:-0.01em;background:var(--paper);color:var(--ink);border:1px solid var(--ink-24);border-radius:2px;cursor:pointer">Book a demo</button>
        <button style="height:36px;padding:0 14px;font:500 14px/1 var(--font-sans);letter-spacing:-0.01em;background:var(--paper);color:var(--ink);border:1px solid var(--ink-24);border-radius:2px;cursor:pointer">Book a demo</button>
        <button style="height:48px;padding:0 20px;font:500 15px/1 var(--font-sans);letter-spacing:-0.01em;background:var(--paper);color:var(--ink);border:1px solid var(--ink-24);border-radius:2px;cursor:pointer">Book a demo</button>
      </div>
    </div>

    <div>
      <div class="spec-label">Ink — solid black</div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:14px;align-items:flex-start">
        <button style="height:30px;padding:0 12px;font:500 13px/1 var(--font-sans);letter-spacing:-0.01em;background:var(--ink);color:var(--paper);border:1px solid var(--ink);border-radius:2px;cursor:pointer">Publish</button>
        <button style="height:36px;padding:0 14px;font:500 14px/1 var(--font-sans);letter-spacing:-0.01em;background:var(--ink);color:var(--paper);border:1px solid var(--ink);border-radius:2px;cursor:pointer">Publish</button>
        <button style="height:48px;padding:0 20px;font:500 15px/1 var(--font-sans);letter-spacing:-0.01em;background:var(--ink);color:var(--paper);border:1px solid var(--ink);border-radius:2px;cursor:pointer">Publish all drafts</button>
      </div>
    </div>

  </div>

  <div style="background:var(--ink);padding:32px;margin:0 -56px;padding-left:56px;padding-right:56px">
    <div class="spec-label" style="color:var(--paper-56)">Inverted · on ink</div>
    <div style="display:flex;gap:12px;margin-top:16px;align-items:center">
      <button style="height:36px;padding:0 14px;font:500 14px/1 var(--font-sans);background:var(--yellow);color:var(--ink);border:1px solid var(--yellow);border-radius:2px">Start free audit</button>
      <button style="height:36px;padding:0 14px;font:500 14px/1 var(--font-sans);background:transparent;color:var(--paper);border:1px solid var(--paper-24);border-radius:2px">Book a demo</button>
      <button style="height:36px;padding:0 14px;font:500 14px/1 var(--font-sans);background:var(--paper);color:var(--ink);border:1px solid var(--paper);border-radius:2px">Read the docs</button>
      <button style="height:36px;padding:0 14px;font:500 14px/1 var(--font-sans);background:transparent;color:var(--paper);border:1px solid transparent;border-radius:2px">Skip →</button>
    </div>
  </div>
</div></body></html>
