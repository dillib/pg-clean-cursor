<!doctype html><html><head><meta charset="utf-8"><title>Type — scale</title><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card">
  <div class="card__head"><div><div class="card__eyebrow">Type · Scale</div><div class="card__title">A single ramp. Geist throughout.</div></div><div class="card__meta">fs-xs → fs-6xl<br/>11 · 13 · 15 · 17 · 20 · 28 · 40 · 56 · 80 · 120 · 180</div></div>
  <table style="width:100%;border-collapse:collapse;font-family:var(--font-sans)">
    <tbody>
    <script>
      const rows = [
        ['fs-xs',11,'mono caption','mono'],
        ['fs-sm',13,'Small body / table cell',''],
        ['fs-base',15,'Default body',''],
        ['fs-md',17,'Emphasis body',''],
        ['fs-lg',20,'Sub-heading',''],
        ['fs-xl',28,'H3 · 500',''],
        ['fs-2xl',40,'H2 · 600',''],
        ['fs-3xl',56,'H1 · 600',''],
        ['fs-4xl',80,'Hero · 600',''],
        ['fs-5xl',120,'Monumental · 700',''],
      ];
      document.write(rows.map(([t,s,l,m]) => `
        <tr style="border-bottom:1px solid var(--hairline)">
          <td style="padding:20px 24px 20px 0;width:120px;vertical-align:middle" class="mono"><span style="color:var(--fg-subtle);font-size:11px">${t}</span><br/><span style="font-size:11px;color:var(--fg-muted)">${s}px</span></td>
          <td style="padding:20px 0;vertical-align:middle"><span style="font-family:${m==='mono'?'var(--font-mono)':'var(--font-display)'};font-size:${s}px;font-weight:${s>=80?700:s>=28?600:500};letter-spacing:${s>=28?'-0.03em':'-0.01em'};line-height:1">${l}</span></td>
        </tr>`).join(''));
    </script>
    </tbody>
  </table>
</div></body></html>
