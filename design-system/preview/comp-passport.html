<!doctype html><html><head><meta charset="utf-8"><title>Components — passport card</title><link rel="stylesheet" href="_preview.css"></head>
<body><div class="card card--dark">
  <div class="card__head"><div><div class="card__eyebrow">Components · Passport card</div><div class="card__title" style="color:var(--paper)">The hero surface.</div></div><div class="card__meta">Editor preview<br/>Viewer header<br/>Catalog row</div></div>

  <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:28px">

    <!-- Editor preview (dark, headline) -->
    <div style="background:var(--ink);border:1px solid var(--paper-12);padding:28px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <span class="mono" style="font-size:11px;color:var(--paper-56);letter-spacing:0.08em;text-transform:uppercase">Northfield Textiles</span>
          <div style="font-family:var(--font-display);font-size:40px;font-weight:600;letter-spacing:-0.025em;color:var(--paper);margin-top:8px">Merino Crew Ink</div>
          <div class="mono" style="font-size:12px;color:var(--paper-56);margin-top:6px">TX-0448-B · GTIN 4006381333931 · v1.4.2</div>
        </div>
        <div style="display:flex;gap:8px">
          <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 8px;font:500 11px/1 var(--font-mono);background:var(--yellow);color:var(--ink);border-radius:2px"><span style="width:6px;height:6px;border-radius:50%;background:var(--ink)"></span>Live</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin-top:28px;border-top:1px solid var(--paper-12)">
        <script>
          const fields=[['Composition','78% merino · 18% rPET'],['Supply chain','4 tiers · 11 suppliers'],['Recyclability','Grade B'],['SVHC','None declared']];
          document.write(fields.map(([k,v])=>`<div style="padding:16px 16px 16px 0;border-right:1px solid var(--paper-12)"><span class="mono" style="font-size:10px;color:var(--paper-40);letter-spacing:0.08em;text-transform:uppercase">${k}</span><div style="color:var(--paper);font-size:14px;margin-top:6px">${v}</div></div>`).join(''));
        </script>
      </div>
    </div>

    <!-- QR surface (yellow) -->
    <div style="background:var(--yellow);color:var(--ink);padding:28px;display:flex;flex-direction:column;justify-content:space-between">
      <div>
        <span class="mono" style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase">Scan to view</span>
        <div style="font-family:var(--font-display);font-size:22px;font-weight:600;letter-spacing:-0.02em;margin-top:8px">Consumer-facing passport</div>
      </div>
      <div style="background:var(--paper);padding:14px;margin:20px 0">
        <div style="aspect-ratio:1/1;background:
          repeating-conic-gradient(var(--ink) 0% 25%, var(--paper) 0% 50%) 0 0/16px 16px;
          border:3px solid var(--ink)"></div>
      </div>
      <div class="mono" style="font-size:11px">photonictag.eu/p/TX0448B</div>
    </div>

  </div>

  <!-- Catalog row -->
  <div style="background:var(--ink);border:1px solid var(--paper-12)">
    <div style="display:grid;grid-template-columns:60px 1fr 1fr 120px 120px 100px;align-items:center;padding:16px 20px;border-bottom:1px solid var(--paper-12)" class="mono" >
      <span style="color:var(--paper-40);font-size:10px;letter-spacing:0.1em;text-transform:uppercase">#</span>
      <span style="color:var(--paper-40);font-size:10px;letter-spacing:0.1em;text-transform:uppercase">Product</span>
      <span style="color:var(--paper-40);font-size:10px;letter-spacing:0.1em;text-transform:uppercase">GTIN</span>
      <span style="color:var(--paper-40);font-size:10px;letter-spacing:0.1em;text-transform:uppercase">Version</span>
      <span style="color:var(--paper-40);font-size:10px;letter-spacing:0.1em;text-transform:uppercase">State</span>
      <span style="color:var(--paper-40);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;text-align:right">Updated</span>
    </div>
    <script>
      const rows=[['TX-0448-B','Merino Crew Ink','4006381333931','v1.4.2','Live','2h'],['TX-0449-B','Merino Crew Bone','4006381333948','v1.4.2','Live','2h'],['TX-1102-A','Base Tee Ink','4006381334051','v0.9.0','Draft','yesterday'],['BT-2200-R','PowerCell 48V','7612341208883','v2.1.0','Filing','4d']];
      document.write(rows.map(([id,n,g,v,s,u])=>{
        const stateStyle = s==='Live'?'background:var(--yellow);color:var(--ink)':s==='Filing'?'background:var(--paper);color:var(--ink)':'border:1px solid var(--paper-24);color:var(--paper-72)';
        return `<div style="display:grid;grid-template-columns:60px 1fr 1fr 120px 120px 100px;align-items:center;padding:14px 20px;border-bottom:1px solid var(--paper-12);color:var(--paper)" class="mono">
          <span style="color:var(--paper-56);font-size:12px">${id}</span>
          <span style="font-family:var(--font-sans);font-size:14px">${n}</span>
          <span style="font-size:12px;color:var(--paper-72)">${g}</span>
          <span style="font-size:12px">${v}</span>
          <span><span style="display:inline-flex;padding:3px 8px;font:500 11px/1 var(--font-mono);border-radius:2px;${stateStyle}">${s}</span></span>
          <span style="font-size:12px;color:var(--paper-56);text-align:right">${u}</span>
        </div>`;
      }).join(''));
    </script>
  </div>
</div></body></html>
