# Fly.io — PhotonicTag staging
# Deploy with: fly deploy --config fly.staging.toml --app photonictag-staging
app = "photonictag-staging"
primary_region = "fra"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  APP_BASE_URL = "https://photonictag-staging.fly.dev"
  AI_PROVIDER = "mistral"
  AUTH_PROVIDER = "workos"
  EMAIL_TIMEZONE = "Europe/Berlin"

[http_service]
  internal_port = 8080
  force_https = true
  # Staging: let it scale to zero to stay inside free tier.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  strategy = "rolling"
