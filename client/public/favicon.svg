<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="28%" stop-color="#D97706"/>
      <stop offset="62%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Gold gradient background -->
  <rect width="64" height="64" rx="14" fill="url(#gold)"/>
  <!-- Subtle highlight -->
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>

  <!-- TOP-LEFT finder pattern -->
  <!-- Outer white square -->
  <rect x="10" y="10" width="17" height="17" rx="3" fill="white"/>
  <!-- Gold cutout ring -->
  <rect x="13" y="13" width="11" height="11" rx="1.5" fill="#D97706"/>
  <!-- Inner white dot -->
  <rect x="16" y="16" width="5" height="5" rx="1" fill="white"/>

  <!-- TOP-RIGHT finder pattern -->
  <rect x="37" y="10" width="17" height="17" rx="3" fill="white"/>
  <rect x="40" y="13" width="11" height="11" rx="1.5" fill="#D97706"/>
  <rect x="43" y="16" width="5" height="5" rx="1" fill="white"/>

  <!-- BOTTOM-LEFT finder pattern -->
  <rect x="10" y="37" width="17" height="17" rx="3" fill="white"/>
  <rect x="13" y="40" width="11" height="11" rx="1.5" fill="#D97706"/>
  <rect x="16" y="43" width="5" height="5" rx="1" fill="white"/>

  <!-- Timing dots (centre column & row) -->
  <rect x="30" y="10" width="4" height="4" rx="1" fill="white"/>
  <rect x="10" y="30" width="4" height="4" rx="1" fill="white"/>

  <!-- Data cells (bottom-right quadrant) -->
  <rect x="37" y="37" width="6" height="6" rx="1.5" fill="white"/>
  <rect x="45" y="37" width="6" height="6" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="37" y="45" width="6" height="6" rx="1.5" fill="white" opacity="0.85"/>
  <rect x="45" y="45" width="6" height="6" rx="1.5" fill="white" opacity="0.5"/>

  <!-- Centre data dot -->
  <rect x="30" y="30" width="4" height="4" rx="1" fill="white" opacity="0.7"/>
  <rect x="37" y="30" width="4" height="4" rx="1" fill="white" opacity="0.6"/>
  <rect x="30" y="37" width="4" height="4" rx="1" fill="white" opacity="0.6"/>
</svg>
